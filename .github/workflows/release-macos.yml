name: Release macOS

on:
  workflow_dispatch:

env:
  FB_ENABLED: "true"
  FB_API_KEY: ${{ secrets.FB_API_KEY }}
  FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
  FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
  FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
  FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
  FB_APP_ID: ${{ secrets.FB_APP_ID }}
  FB_MEASUREMENT_ID: ${{ secrets.FB_MEASUREMENT_ID }}
  FB_WEB_CLIENT_ID: ${{ secrets.FB_WEB_CLIENT_ID }}

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            arch: "silicon"
            type: "aarch64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            arch: "silicon"
            type: "x86_64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable (macos only)
        uses: dtolnay/rust-toolchain@stable
        if: matrix.platform == 'macos-latest'
        with:
          targets: ${{ matrix.type == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: npm install #

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "PlayForge v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
