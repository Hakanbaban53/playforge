<div class="titlebar" data-tauri-drag-region>
    <div class="title" data-tauri-drag-region>
        <span>ParkMan</span>
    </div>
    <div class="window-controls">
        <button [matMenuTriggerFor]="langMenu" class="lang-btn">
            <mat-icon>language</mat-icon>
            <span class="lang-text">{{ currentLang() | uppercase }}</span>
        </button>
        <mat-menu #langMenu="matMenu">
            <button mat-menu-item (click)="switchLanguage('en')">
                <span>English</span>
            </button>
            <button mat-menu-item (click)="switchLanguage('tr')">
                <span>Türkçe</span>
            </button>
        </mat-menu>

        <button (click)="minimize()" [title]="'COMMON.MINIMIZE' | translate">
            <mat-icon>remove</mat-icon>
        </button>
        <button (click)="maximize()" [title]="'COMMON.MAXIMIZE' | translate">
            <mat-icon>{{ isMaximized() ? 'filter_none' : 'crop_square' }}</mat-icon>
        </button>
        <button (click)="close()" class="close-btn" [title]="'COMMON.CLOSE' | translate">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>
